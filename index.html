const state = {
  lang: "fr",

  search: "",

  mealFilter: 0,
  checkerInput: "",
  checkerResult: null,
};

const G = { dark: "#1b4332", mid: "#2d6a4f", light: "#40916c", pale: "#d8f3dc", bg: "#f7f3ee" };

function getName(item) { return state.lang === "fr" ? item.name : state.lang === "ar" ? item.nameAr : item.nameMa; }
function getNote(item) { return state.lang === "fr" ? item.note : state.lang === "ar" ? item.noteAr : item.noteMa; }
function getCat(item)  { return state.lang === "fr" ? item.cat  : state.lang === "ar" ? item.catAr  : item.catMa; }
function getReason(item) { return state.lang === "fr" ? item.reason : state.lang === "ar" ? item.reasonAr : item.reasonMa; }
function getTime(m) { return state.lang === "fr" ? m.time : state.lang === "ar" ? m.timeAr : m.timeMa; }
function getMealName(m) { return state.lang === "fr" ? m.name : state.lang === "ar" ? m.nameAr : m.nameMa; }
function getIngredients(m) { return state.lang === "fr" ? m.ingredients : state.lang === "ar" ? m.ingredientsAr : m.ingredientsMa; }
function getTip(m) { return state.lang === "fr" ? m.tip : state.lang === "ar" ? m.tipAr : m.tipMa; }
function getRuleTitle(r) { return state.lang === "fr" ? r.title : state.lang === "ar" ? r.titleAr : r.titleMa; }
function getRuleDesc(r) { return state.lang === "fr" ? r.desc : state.lang === "ar" ? r.descAr : r.descMa; }

function handleCheck() {
  const q = state.checkerInput.toLowerCase().trim();
  if (!q) return;
  const allowed = ALLOWED.find(f =>
    f.name.toLowerCase().includes(q) || f.nameAr.includes(q) || f.nameMa.includes(q) ||
    q.includes(f.name.toLowerCase().split(" ")[0])
  );
  const forbidden = FORBIDDEN.find(f =>
    f.name.toLowerCase().includes(q) || f.nameAr.includes(q) || f.nameMa.includes(q) ||
    q.includes(f.name.toLowerCase().split(" ")[0])
  );
  if (allowed) state.checkerResult = { status: "allowed", item: allowed };
  else if (forbidden) state.checkerResult = { status: "forbidden", item: forbidden };
  else state.checkerResult = { status: "unknown" };
  render();
}

// ── RENDER ──────────────────────────────────────────────────────────────────────
function render() {
  const t = T[state.lang];
  const isRtl = t.dir === "rtl";
  const rowDir = isRtl ? "row-reverse" : "row";
  const textAlign = isRtl ? "right" : "left";

  const selectedCat = t.categories[state.catFilter];
  const filteredAllowed = ALLOWED.filter(f => {
    const name = getName(f);
    const matchSearch = name.toLowerCase().includes(state.search.toLowerCase());
    const matchCat = state.catFilter === 0 || getCat(f) === selectedCat;
    return matchSearch && matchCat;
  });

  const selectedTime = t.mealTimes[state.mealFilter];
  const filteredMeals = MEALS.filter(m => state.mealFilter === 0 || getTime(m) === selectedTime);

  const btnFilter = (active) => `background:${active ? G.mid : '#fff'};color:${active ? '#fff' : '#555'};border:1.5px solid ${active ? G.mid : '#ddd'};border-radius:20px;padding:5px 13px;font-size:12px;cursor:pointer;font-weight:500;white-space:nowrap`;

  // CHECKER TAB
  let tabContent = '';
  if (state.tab === 'checker') {
    let resultHtml = '';
    if (state.checkerResult) {
      const r = state.checkerResult;
      if (r.status === 'allowed') {
        const item = r.item;
        resultHtml = `<div style="border-radius:14px;padding:16px 18px;margin-bottom:20px;background:#d8f3dc;border:2px solid #52b788">
          <div style="font-size:26px;margin-bottom:6px">✅ ${item.emoji}</div>
          <div style="font-weight:700;font-size:17px;color:${G.dark}">${getName(item)}</div>
          <div style="font-size:13px;color:${G.light};margin-top:4px">${t.checker.allowedLabel} ${getCat(item)}</div>

        </div>`;
      } else if (r.status === 'forbidden') {
        const item = r.item;
        resultHtml = `<div style="border-radius:14px;padding:16px 18px;margin-bottom:20px;background:#ffe5e5;border:2px solid #e07070">
          <div style="font-size:26px;margin-bottom:6px">❌ ${item.emoji}</div>
          <div style="font-weight:700;font-size:17px;color:#7f1d1d">${getName(item)}</div>
          <div style="font-size:13px;color:#c0392b;margin-top:4px">${t.checker.forbiddenLabel}</div>

    const forbiddenCards = FORBIDDEN.map(f => `

          </div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;justify-content:${isRtl?'flex-end':'flex-start'}">${ings}</div>
          ${getTip(m) ? `<div style="font-size:12px;color:#777;font-style:italic;text-align:${textAlign}">💡 ${getTip(m)}</div>` : ''}
        </div>`;
    }).join('');
    tabContent = `
      <h2 style="font-size:18px;font-weight:700;margin-bottom:2px">${t.repas.title}</h2>
      <p style="font-size:13px;color:#666;margin-bottom:14px">${t.repas.sub}</p>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;justify-content:${isRtl?'flex-end':'flex-start'}">${timeBtns}</div>
      <div style="display:grid;gap:12px">${cards}</div>`;

  } else if (state.tab === 'regles') {
    const ruleCards = RULES.map(r => `
      <div style="background:#fff;border-radius:14px;padding:15px 17px;border:1.5px solid #e8f5e9;display:flex;gap:14px;align-items:flex-start;flex-direction:${rowDir}">
        <div style="font-size:20px;width:40px;height:40px;background:${G.pale};border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">${r.icon}</div>
        <div style="text-align:${textAlign}">
          <div style="font-weight:700;font-size:14px;margin-bottom:4px">${getRuleTitle(r)}</div>
          <div style="font-size:13px;color:#555;line-height:1.6">${getRuleDesc(r)}</div>
        </div>
      </div>`).join('');
    tabContent = `
      <h2 style="font-size:18px;font-weight:700;margin-bottom:2px">${t.regles.title}</h2>
      <p style="font-size:13px;color:#666;margin-bottom:18px">${t.regles.sub}</p>
      <div style="display:grid;gap:12px;margin-bottom:24px">${ruleCards}</div>
      <div style="background:#fff8e1;border:1.5px solid #f4c542;border-radius:12px;padding:14px 16px;font-size:12px;color:#7a6000;text-align:${textAlign}">
        ⚠️ <strong>${state.lang==='fr'?'Note importante :':'ملاحظة مهمة:'}</strong> ${t.regles.disclaimer}
      </div>`;
  }

  const langBtns = ['fr','ar','ma'].map(l => `
    <button onclick="setLang('${l}')" style="background:${state.lang===l?'#fff':'rgba(255,255,255,0.2)'};color:${state.lang===l?G.dark:'#fff'};border:none;border-radius:20px;padding:4px 13px;font-size:12px;font-weight:700;cursor:pointer">
      ${T[l].flag} ${T[l].label}
    </button>`).join('');

  const tabBtns = Object.entries(t.tabs).map(([key, label]) => `
    <button onclick="setTab('${key}')" style="background:${state.tab===key?'#fff':'rgba(255,255,255,0.15)'};color:${state.tab===key?G.mid:'#fff'};border:none;border-radius:8px 8px 0 0;padding:7px 13px;font-size:12px;font-weight:600;cursor:pointer">
      ${label}
    </button>`).join('');

  document.getElementById('app').innerHTML = `
    <div style="font-family:${isRtl?"'Segoe UI',Tahoma,Arial,sans-serif":"'Segoe UI',system-ui,sans-serif"};min-height:100vh;background:${G.bg};color:#1a1a1a">
      <header style="background:linear-gradient(135deg,${G.dark} 0%,${G.mid} 60%,${G.light} 100%);color:#fff;padding:20px 20px 0;text-align:center;direction:${t.dir}">
        <div style="font-size:28px;margin-bottom:2px">🌿</div>
        <h1 style="margin:0;font-size:20px;font-weight:700">${state.lang==='fr'?'Système Tayyibat':state.lang==='ar'?'نظام الطيبات':'نظام الطيبات 🇲🇦'}</h1>
        <p style="margin:3px 0 10px;font-size:12px;opacity:0.85">${t.appSubtitle}</p>
        <div style="display:flex;justify-content:center;gap:5px;margin-bottom:10px;flex-wrap:wrap">${langBtns}</div>
        <div style="display:flex;gap:3px;justify-content:center;flex-wrap:wrap">${tabBtns}</div>
      </header>
      <main style="max-width:600px;margin:0 auto;padding:20px 16px 48px;direction:${t.dir}">
        ${tabContent}
      </main>
    </div>`;

  // Re-bind input events
  const ci = document.getElementById('checkerInput');
  if (ci) {
    ci.addEventListener('input', e => { state.checkerInput = e.target.value; state.checkerResult = null; });
    ci.addEventListener('keydown', e => { if (e.key === 'Enter') doCheck(); });
  }
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

window.setLang = function(l) { state.lang = l; state.catFilter = 0; state.mealFilter = 0; state.checkerResult = null; state.search = ''; state.checkerInput = ''; render(); };
window.setTab = function(t) { state.tab = t; render(); };
window.setCat = function(i) { state.catFilter = i; render(); };
window.setMeal = function(i) { state.mealFilter = i; render(); };
window.setSearch = function(v) { state.search = v; render(); };
window.doCheck = function() { handleCheck(); };

render();
</script>
</body>
</html>
