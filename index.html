<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Système Tayyibat 🌿</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'Inter', 'Segoe UI', Tahoma, sans-serif; background: #f5f0e8; color: #1a1a1a; min-height: 100vh; }
    button { cursor: pointer; font-family: inherit; transition: all 0.18s ease; }
    input { outline: none; font-family: inherit; }

    /* Welcome Screen */
    #welcome-screen {
      position: fixed; inset: 0; z-index: 100;
      background: linear-gradient(160deg, #0b3d2e 0%, #1b5e40 40%, #2e7d52 70%, #1a4731 100%);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 28px 24px; overflow: hidden;
    }
    #welcome-screen::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(134,239,172,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse at 80% 80%, rgba(134,239,172,0.08) 0%, transparent 50%);
    }
    .welcome-particles { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
    .particle {
      position: absolute; width: 4px; height: 4px; border-radius: 50%;
      background: rgba(134,239,172,0.4); animation: floatUp 8s infinite linear;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 0.6; }
      100% { transform: translateY(-20px) scale(1.5); opacity: 0; }
    }
    .welcome-logo { font-size: 64px; margin-bottom: 12px; animation: pulse 3s ease-in-out infinite; position: relative; z-index: 1; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    .welcome-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 32px; font-weight: 900; color: #fff;
      text-align: center; margin-bottom: 6px; position: relative; z-index: 1;
      text-shadow: 0 2px 20px rgba(0,0,0,0.3);
    }
    .welcome-subtitle { font-size: 13px; color: rgba(255,255,255,0.72); text-align: center; margin-bottom: 24px; position: relative; z-index: 1; }
    .welcome-slogan {
      background: rgba(255,255,255,0.10); backdrop-filter: blur(10px);
      border: 1px solid rgba(134,239,172,0.3); border-radius: 18px;
      padding: 16px 22px; margin-bottom: 30px; text-align: center; position: relative; z-index: 1;
      max-width: 380px;
    }
    .slogan-icon { font-size: 22px; margin-bottom: 6px; }
    .slogan-text { font-size: 14px; color: #d1fae5; line-height: 1.6; font-style: italic; font-weight: 500; }
    .slogan-sub { font-size: 11px; color: rgba(209,250,229,0.65); margin-top: 6px; }
    .lang-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 360px; position: relative; z-index: 1; margin-bottom: 20px; }
    .lang-btn {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px; padding: 10px 6px; color: #fff; font-size: 12px; font-weight: 600;
      display: flex; flex-direction: column; align-items: center; gap: 4px;
    }
    .lang-btn:hover { background: rgba(255,255,255,0.22); transform: translateY(-2px); border-color: rgba(134,239,172,0.5); }
    .lang-btn .flag { font-size: 22px; }
    .enter-btn {
      background: linear-gradient(135deg, #4ade80, #22c55e);
      color: #0b3d2e; border: none; border-radius: 14px;
      padding: 14px 40px; font-size: 15px; font-weight: 700;
      position: relative; z-index: 1; box-shadow: 0 4px 20px rgba(74,222,128,0.35);
    }
    .enter-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(74,222,128,0.45); }

    /* App */
    #app { display: none; }

    /* Header */
    .app-header {
      background: linear-gradient(135deg, #0b3d2e 0%, #1b5e40 50%, #2e7d52 100%);
      color: #fff; padding: 16px 16px 0; position: sticky; top: 0; z-index: 50;
      box-shadow: 0 2px 20px rgba(0,0,0,0.25);
    }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
    .header-brand { display: flex; align-items: center; gap: 8px; }
    .header-logo { font-size: 24px; }
    .header-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; }
    .header-sub { font-size: 10px; opacity: 0.7; margin-top: 1px; }
    .lang-pills { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
    .lang-pill {
      background: rgba(255,255,255,0.13); border: 1px solid rgba(255,255,255,0.15);
      color: #fff; border-radius: 20px; padding: 3px 9px; font-size: 11px; font-weight: 600;
    }
    .lang-pill.active { background: #fff; color: #1b5e40; border-color: #fff; }
    .lang-pill:hover:not(.active) { background: rgba(255,255,255,0.22); }
    .nav-tabs { display: flex; gap: 2px; overflow-x: auto; padding-bottom: 0; scrollbar-width: none; }
    .nav-tabs::-webkit-scrollbar { display: none; }
    .nav-tab {
      background: rgba(255,255,255,0.1); border: none; border-radius: 10px 10px 0 0;
      color: rgba(255,255,255,0.7); padding: 9px 14px; font-size: 12px; font-weight: 600;
      white-space: nowrap; flex-shrink: 0;
    }
    .nav-tab.active { background: #f5f0e8; color: #1b5e40; }
    .nav-tab:hover:not(.active) { background: rgba(255,255,255,0.18); color: #fff; }

    /* Main content */
    main { max-width: 600px; margin: 0 auto; padding: 20px 16px 60px; }

    /* Cards */
    .card {
      background: #fff; border-radius: 16px; border: 1.5px solid #e8f0e9;
      box-shadow: 0 2px 12px rgba(27,94,64,0.06); overflow: hidden;
    }
    .card-pad { padding: 14px 16px; }
    .section-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; margin-bottom: 4px; color: #0b3d2e; }
    .section-sub { font-size: 13px; color: #888; margin-bottom: 18px; }

    /* Checker */
    .checker-input-row { display: flex; gap: 8px; margin-bottom: 16px; }
    .checker-input {
      flex: 1; padding: 13px 16px; border-radius: 12px; border: 2px solid #e0e8e2;
      font-size: 15px; background: #fafaf8; transition: border-color 0.2s;
    }
    .checker-input:focus { border-color: #2e7d52; background: #fff; }
    .check-btn {
      background: linear-gradient(135deg, #2e7d52, #1b5e40);
      color: #fff; border: none; border-radius: 12px; padding: 13px 18px;
      font-size: 18px; font-weight: 700; box-shadow: 0 2px 10px rgba(27,94,64,0.3);
    }
    .check-btn:hover { transform: scale(1.04); }

    .result-allowed {
      border-radius: 14px; padding: 16px 18px; margin-bottom: 16px;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border: 2px solid #4ade80;
    }
    .result-forbidden {
      border-radius: 14px; padding: 16px 18px; margin-bottom: 16px;
      background: linear-gradient(135deg, #fef2f2, #fee2e2);
      border: 2px solid #f87171;
    }
    .result-unknown {
      border-radius: 14px; padding: 16px 18px; margin-bottom: 16px;
      background: linear-gradient(135deg, #fefce8, #fef9c3);
      border: 2px solid #facc15;
    }
    .result-icon { font-size: 28px; margin-bottom: 6px; }
    .result-name { font-weight: 700; font-size: 17px; margin-bottom: 4px; }
    .result-tag { font-size: 12px; font-weight: 600; display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; margin-bottom: 6px; }
    .tag-allowed { background: #4ade80; color: #0b3d2e; }
    .tag-forbidden { background: #f87171; color: #7f1d1d; }
    .result-note { font-size: 12px; color: #555; font-style: italic; margin-top: 4px; }

    /* Forbidden grid */
    .forbidden-title { font-size: 14px; font-weight: 700; color: #b91c1c; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .forbidden-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .forbidden-card {
      background: #fff; border: 1.5px solid #fecaca; border-radius: 12px;
      padding: 10px 12px; display: flex; align-items: flex-start; gap: 8px;
    }
    .forbidden-emoji { font-size: 20px; flex-shrink: 0; margin-top: 1px; }
    .forbidden-name { font-weight: 600; font-size: 12px; color: #7f1d1d; }
    .forbidden-reason { font-size: 10px; color: #999; margin-top: 2px; line-height: 1.4; }

    /* Filter pills */
    .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .filter-pill {
      background: #fff; color: #555; border: 1.5px solid #dde5df;
      border-radius: 20px; padding: 5px 13px; font-size: 12px; font-weight: 500;
    }
    .filter-pill.active { background: #1b5e40; color: #fff; border-color: #1b5e40; }
    .filter-pill:hover:not(.active) { border-color: #2e7d52; color: #2e7d52; }

    /* Search */
    .search-input {
      width: 100%; padding: 12px 16px; border-radius: 12px; border: 2px solid #e0e8e2;
      font-size: 14px; background: #fafaf8; margin-bottom: 14px; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: #2e7d52; background: #fff; }

    /* Food cards */
    .food-list { display: grid; gap: 8px; }
    .food-card {
      background: #fff; border: 1.5px solid #e8f0e9; border-radius: 13px;
      padding: 12px 14px; display: flex; align-items: center; gap: 12px;
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .food-card:hover { box-shadow: 0 4px 16px rgba(27,94,64,0.1); transform: translateY(-1px); }
    .food-emoji { font-size: 24px; width: 36px; text-align: center; flex-shrink: 0; }
    .food-info { flex: 1; }
    .food-name { font-weight: 600; font-size: 14px; color: #1a1a1a; }
    .food-meta { font-size: 11px; color: #888; margin-top: 2px; }
    .food-badge { background: #dcfce7; color: #166534; font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: 20px; flex-shrink: 0; }

    /* Meal cards */
    .meal-card {
      background: #fff; border: 1.5px solid #e8f0e9; border-radius: 16px;
      padding: 16px; box-shadow: 0 2px 10px rgba(27,94,64,0.05);
      transition: box-shadow 0.15s, transform 0.15s;
    }
    .meal-card:hover { box-shadow: 0 6px 20px rgba(27,94,64,0.1); transform: translateY(-2px); }
    .meal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .meal-emoji { font-size: 28px; }
    .meal-name { font-weight: 700; font-size: 15px; color: #0b3d2e; }
    .meal-time { font-size: 11px; color: #888; }
    .meal-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
    .meal-tag { background: #f0faf4; color: #1b5e40; font-size: 11px; padding: 3px 10px; border-radius: 20px; font-weight: 500; border: 1px solid #c6e6cf; }
    .meal-tip { font-size: 12px; color: #666; font-style: italic; display: flex; gap: 4px; align-items: flex-start; }

    /* Rules */
    .rule-card {
      background: #fff; border: 1.5px solid #e8f0e9; border-radius: 14px;
      padding: 15px; display: flex; gap: 14px; align-items: flex-start;
      transition: box-shadow 0.15s;
    }
    .rule-card:hover { box-shadow: 0 4px 16px rgba(27,94,64,0.08); }
    .rule-icon-box {
      width: 44px; height: 44px; background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border-radius: 12px; display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .rule-title { font-weight: 700; font-size: 14px; color: #0b3d2e; margin-bottom: 5px; }
    .rule-desc { font-size: 13px; color: #555; line-height: 1.6; }
    .disclaimer {
      background: linear-gradient(135deg, #fefce8, #fef9c3); border: 1.5px solid #facc15;
      border-radius: 14px; padding: 14px 16px; font-size: 12px; color: #713f12; line-height: 1.6; margin-top: 20px;
    }

    /* Empty */
    .empty-state { text-align: center; color: #aaa; padding: 40px 20px; font-size: 14px; }
    .empty-state .empty-icon { font-size: 36px; margin-bottom: 8px; }

    /* Animations */
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }

    /* Necklace deco */
    .necklace-deco { display: flex; align-items: center; gap: 6px; justify-content: center; margin: 8px 0; }
    .bead { width: 8px; height: 8px; border-radius: 50%; }
    .bead-green { background: #4ade80; }
    .bead-gold { background: #fbbf24; }
    .bead-white { background: rgba(255,255,255,0.5); }

    /* Stats bar */
    .stats-bar { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
    .stat-chip { background: #fff; border: 1.5px solid #e8f0e9; border-radius: 12px; padding: 10px; text-align: center; }
    .stat-number { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: #1b5e40; }
    .stat-label { font-size: 10px; color: #888; margin-top: 2px; }

    /* Responsive */
    @media (max-width: 360px) { .lang-grid { grid-template-columns: repeat(4, 1fr); } .lang-pill { font-size: 10px; padding: 2px 7px; } }
  </style>
</head>

  {icon:"🌡️", fr:"Cuisson légère de préférence", en:"Light cooking preferred", es:"Cocción ligera preferida", de:"Schonende Zubereitung bevorzugt", tr:"Hafif pişirme tercih edilir", zh:"优先选择轻度烹饪", ma:"الطيب الخفيف أحسن", tz:"ⴰⵎⵛⵉⵡⴰⵔ ⴰⵅⴼⵉⴼ",
   descFr:"Préférer la grillade, vapeur ou eau. Éviter les fritures excessives.", descEn:"Prefer grilling, steaming or boiling. Avoid excessive frying.",
   descEs:"Preferir asado, vapor o hervido. Evitar frituras excesivas.", descDe:"Grillen, Dämpfen oder Kochen bevorzugen. Frittieren vermeiden.",
   descTr:"Izgara, buğulama veya haşlama tercih edin. Aşırı kızartmadan kaçının.", descZh:"优先选择烧烤、蒸或水煮，避免过度油炸。",
   descMa:"اختار الشوي أو البخار أو السلق. بعد على القلي الزيادة.", descTz:"ⴼⵔⵏ ⴰⴷⵔⴰⵔ ⵏ ⵉⵙⵙⵜⵉⵡⴽⴰⵍ."},
];

// ─── STATE ────────────────────────────────────────────────────────────────────
const state = {
  lang:"fr", tab:"checker",
  search:"", catFilter:0, mealFilter:0,
  checkerInput:"", checkerResult:null,
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
const L = () => LANGS[state.lang];

function getName(item) {
  const map = {fr:"fr",en:"en",es:"es",de:"de",tr:"tr",zh:"zh",ma:"ma",tz:"tz"};
  return item[map[state.lang]] || item.fr;
}
function getCat(item) {
  const map = {fr:"cat",en:"catEn",es:"catEs",de:"catDe",tr:"catTr",zh:"catZh",ma:"catMa",tz:"catTz"};
  return item[map[state.lang]] || item.cat;
}
function getReason(item) {
  const map = {fr:"reasonFr",en:"reasonEn",es:"reasonEs",de:"reasonDe",tr:"reasonTr",zh:"reasonZh",ma:"reasonMa",tz:"reasonTz"};
  return item[map[state.lang]] || item.reasonFr;
}
function getMealName(m) { return getName(m); }
function getMealTime(m) {
  const map = {fr:"time",en:"timeEn",es:"timeEs",de:"timeDe",tr:"timeTr",zh:"timeZh",ma:"timeMa",tz:"timeTz"};
  return m[map[state.lang]] || m.time;
}
function getRuleTitle(r) { return getName(r); }
function getRuleDesc(r) {
  const map = {fr:"descFr",en:"descEn",es:"descEs",de:"descDe",tr:"descTr",zh:"descZh",ma:"descMa",tz:"descTz"};
  return r[map[state.lang]] || r.descFr;
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── CHECKER ─────────────────────────────────────────────────────────────────
function handleCheck() {
  const q = state.checkerInput.toLowerCase().trim();
  if (!q) return;
  const allLangs = ['fr','en','es','de','tr','zh','ma','tz'];
  const found_a = ALLOWED.find(f => allLangs.some(l => (f[l]||'').toLowerCase().includes(q)));
  const found_f = FORBIDDEN.find(f => allLangs.some(l => (f[l]||'').toLowerCase().includes(q)));
  if (found_a) state.checkerResult = {status:"allowed", item:found_a};
  else if (found_f) state.checkerResult = {status:"forbidden", item:found_f};
  else state.checkerResult = {status:"unknown"};
  render();
}

// ─── WELCOME ─────────────────────────────────────────────────────────────────
function startApp(lang) {
  state.lang = lang;
  document.getElementById('welcome-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  render();
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
(function spawnParticles() {
  const container = document.getElementById('particles');
  for (let i = 0; i < 16; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%;animation-delay:${Math.random()*8}s;animation-duration:${6+Math.random()*6}s;width:${2+Math.random()*5}px;height:${2+Math.random()*5}px;opacity:${0.2+Math.random()*0.5}`;
    container.appendChild(p);
  }
})();

// ─── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  const t = L();
  const isRtl = t.dir === 'rtl';
  const dir = t.dir;

  // Header
  document.getElementById('main-content').dir = dir;
  document.getElementById('h-title').textContent = state.lang === 'fr' ? 'Système Tayyibat' : state.lang === 'zh' ? '塔伊巴特系统' : state.lang === 'tz' ? 'ⴰⵏⵙⵙⴰⵔⵓ ⵏ ⵜⵉⵉⴱⴰⵜ' : 'نظام الطيبات';
  document.getElementById('h-sub').textContent = t.subtitle;
  document.getElementById('app-header').dir = dir;

  // Lang pills
  const pills = ['ma','tz','fr','en','es','de','tr','zh'].map(l => {
    const active = state.lang === l;
    return `<button class="lang-pill${active?' active':''}" onclick="window.setLang('${l}')">${LANGS[l].flag} ${LANGS[l].label}</button>`;
  }).join('');
  document.getElementById('lang-pills').innerHTML = pills;

  // Nav tabs
  const tabKeys = ['checker','aliments','repas','regles'];
  const navHtml = tabKeys.map(k => `<button class="nav-tab${state.tab===k?' active':''}" onclick="window.setTab('${k}')">${t.tabs[k]}</button>`).join('');
  document.getElementById('nav-tabs').innerHTML = navHtml;
  document.getElementById('nav-tabs').style.flexDirection = isRtl ? 'row-reverse' : 'row';

  // Categories & meal times mapping
  const catKeys = {fr:"cat", en:"catEn", es:"catEs", de:"catDe", tr:"catTr", zh:"catZh", ma:"catMa", tz:"catTz"};
  const catKey = catKeys[state.lang] || "cat";
  const frCats = ["Céréales","Graisses & Laitiers","Viandes & Protéines","Fruits","Sucreries","Boissons"];
  const catMap = frCats.reduce((acc, frCat, i) => {
    acc[t.categories[i+1]] = frCat; return acc;
  }, {});

  const selectedLocalCat = t.categories[state.catFilter];
  const frSelectedCat = catMap[selectedLocalCat];

  const filteredAllowed = ALLOWED.filter(f => {
    const name = getName(f).toLowerCase();
    const matchSearch = name.includes(state.search.toLowerCase()) || (state.search === '');
    const matchCat = state.catFilter === 0 || f.cat === frSelectedCat;
    return matchSearch && matchCat;
  });

  const frMealTimes = ["Petit-déjeuner","Déjeuner","Dîner","Snack"];
  const mealTimeKeys = {fr:"time",en:"timeEn",es:"timeEs",de:"timeDe",tr:"timeTr",zh:"timeZh",ma:"timeMa",tz:"timeTz"};
  const selectedLocalTime = t.mealTimes[state.mealFilter];
  const frSelectedTime = state.mealFilter === 0 ? null : frMealTimes[state.mealFilter - 1];
  const filteredMeals = MEALS.filter(m => state.mealFilter === 0 || m.time === frSelectedTime);

  // CONTENT
  let content = '';
  if (state.tab === 'checker') content = renderChecker(t, isRtl);
  else if (state.tab === 'aliments') content = renderAliments(t, isRtl, filteredAllowed);
  else if (state.tab === 'repas') content = renderRepas(t, isRtl, filteredMeals);
  else if (state.tab === 'regles') content = renderRegles(t, isRtl);

  document.getElementById('main-content').innerHTML = `<div class="fade-in">${content}</div>`;

  // Re-bind
  const ci = document.getElementById('checkerInput');
  if (ci) {
    ci.addEventListener('input', e => { state.checkerInput = e.target.value; state.checkerResult = null; });
    ci.addEventListener('keydown', e => { if (e.key === 'Enter') handleCheck(); });
  }
  const si = document.getElementById('searchInput');
  if (si) { si.addEventListener('input', e => { state.search = e.target.value; render(); }); }
}

function renderChecker(t, isRtl) {
  const c = t.checker;
  let resultHtml = '';
  if (state.checkerResult) {
    const r = state.checkerResult;
    if (r.status === 'allowed') {
      const item = r.item;
      resultHtml = `<div class="result-allowed">
        <div class="result-icon">${item.emoji}</div>
        <div class="result-name" style="color:#166534">${getName(item)}</div>
        <span class="result-tag tag-allowed">${c.allowedLabel} · ${getCat(item)}</span>
        ${item.note ? `<div class="result-note">💡 ${item.note}</div>` : ''}
      </div>`;
    } else if (r.status === 'forbidden') {
      const item = r.item;
      resultHtml = `<div class="result-forbidden">
        <div class="result-icon">${item.emoji}</div>
        <div class="result-name" style="color:#991b1b">${getName(item)}</div>
        <span class="result-tag tag-forbidden">${c.forbiddenLabel}</span>
        <div class="result-note">⚠️ ${getReason(item)}</div>
      </div>`;
    } else {
      resultHtml = `<div class="result-unknown">
        <div class="result-icon">❓</div>
        <div class="result-name">${c.unknownTitle}</div>
        <div style="font-size:13px;color:#777;margin-top:4px">${c.unknownSub}</div>
      </div>`;
    }
  }
  const fCards = FORBIDDEN.map(f => `
    <div class="forbidden-card">
      <div class="forbidden-emoji">${f.emoji}</div>
      <div>
        <div class="forbidden-name">${getName(f)}</div>
        <div class="forbidden-reason">${getReason(f)}</div>
      </div>
    </div>`).join('');

  return `
    <div class="stats-bar">
      <div class="stat-chip"><div class="stat-number">${ALLOWED.length}</div><div class="stat-label">${t.stats.foods}</div></div>
      <div class="stat-chip"><div class="stat-number">${MEALS.length}</div><div class="stat-label">${t.stats.meals}</div></div>
      <div class="stat-chip"><div class="stat-number">${RULES.length}</div><div class="stat-label">${t.stats.rules}</div></div>
    </div>
    <div class="section-title">${c.title}</div>
    <div class="section-sub">${c.sub}</div>
    <div class="checker-input-row" style="flex-direction:${isRtl?'row-reverse':'row'}">
      <input id="checkerInput" class="checker-input" value="${esc(state.checkerInput)}" placeholder="${c.placeholder}" dir="${L().dir}" style="text-align:${isRtl?'right':'left'}" />
      <button class="check-btn" onclick="handleCheck()">${isRtl?'←':'→'}</button>
    </div>
    ${resultHtml}
    <div class="forbidden-title">${c.forbiddenSection}</div>
    <div class="forbidden-grid">${fCards}</div>`;
}

function renderAliments(t, isRtl, filtered) {
  const catBtns = t.categories.map((c,i) => `<button class="filter-pill${state.catFilter===i?' active':''}" onclick="window.setCat(${i})">${c}</button>`).join('');
  const cards = filtered.length === 0
    ? `<div class="empty-state"><div class="empty-icon">🔍</div>${t.aliments.notFound}</div>`
    : filtered.map(f => `
      <div class="food-card" style="flex-direction:${isRtl?'row-reverse':'row'}">
        <div class="food-emoji">${f.emoji}</div>
        <div class="food-info" style="text-align:${isRtl?'right':'left'}">
          <div class="food-name">${getName(f)}</div>
          <div class="food-meta">${getCat(f)}${f.note?` · ${f.note}`:''}</div>
        </div>
        <div class="food-badge">✓</div>
      </div>`).join('');
  return `
    <div class="section-title">${t.aliments.title}</div>
    <div class="section-sub">${ALLOWED.length} ${t.aliments.sub}</div>
    <input id="searchInput" class="search-input" value="${esc(state.search)}" placeholder="${t.aliments.searchPlaceholder}" dir="${L().dir}" style="text-align:${isRtl?'right':'left'}" />
    <div class="filter-bar" style="justify-content:${isRtl?'flex-end':'flex-start'}">${catBtns}</div>
    <div class="food-list">${cards}</div>`;
}

function renderRepas(t, isRtl, filtered) {
  const timeBtns = t.mealTimes.map((tm,i) => `<button class="filter-pill${state.mealFilter===i?' active':''}" onclick="window.setMeal(${i})">${tm}</button>`).join('');
  const cards = filtered.map(m => {
    const tags = m.tags.map(tag => `<span class="meal-tag">${tag}</span>`).join('');
    return `<div class="meal-card">
      <div class="meal-header" style="flex-direction:${isRtl?'row-reverse':'row'}">
        <div class="meal-emoji">${m.emoji}</div>
        <div style="text-align:${isRtl?'right':'left'}">
          <div class="meal-name">${getMealName(m)}</div>
          <div class="meal-time">⏰ ${getMealTime(m)}</div>
        </div>
      </div>
      <div class="meal-tags" style="justify-content:${isRtl?'flex-end':'flex-start'}">${tags}</div>
      ${m.tip?`<div class="meal-tip" style="justify-content:${isRtl?'flex-end':'flex-start'}">💡 <span>${m.tip}</span></div>`:''}
    </div>`;
  }).join('');
  return `
    <div class="section-title">${t.repas.title}</div>
    <div class="section-sub">${t.repas.sub}</div>
    <div class="filter-bar" style="justify-content:${isRtl?'flex-end':'flex-start'}">${timeBtns}</div>
    <div style="display:grid;gap:12px">${cards}</div>`;
}

function renderRegles(t, isRtl) {
  const cards = RULES.map(r => `
    <div class="rule-card" style="flex-direction:${isRtl?'row-reverse':'row'}">
      <div class="rule-icon-box">${r.icon}</div>
      <div style="text-align:${isRtl?'right':'left'}">
        <div class="rule-title">${getRuleTitle(r)}</div>
        <div class="rule-desc">${getRuleDesc(r)}</div>
      </div>
    </div>`).join('');
  return `
    <div class="section-title">${t.regles.title}</div>
    <div class="section-sub">${t.regles.sub}</div>
    <div style="display:grid;gap:12px;margin-bottom:16px">${cards}</div>
    <div class="disclaimer">⚠️ ${t.regles.disclaimer}</div>`;
}

// ─── GLOBALS ──────────────────────────────────────────────────────────────────
window.setLang = l => { state.lang=l; state.catFilter=0; state.mealFilter=0; state.checkerResult=null; state.search=''; state.checkerInput=''; render(); };
window.setTab = t => { state.tab=t; render(); };
window.setCat = i => { state.catFilter=i; render(); };
window.setMeal = i => { state.mealFilter=i; render(); };
window.handleCheck = handleCheck;
window.startApp = startApp;
</script>
</body>
</html>
